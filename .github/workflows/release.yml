name: Build & Release Movilex

on:
  push:
    tags:
      - 'v*'
      
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # IMPORTANT: BEFORE npm ci
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            libpixman-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run linux -- --publish=never

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run mac -- --publish=never

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run win -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: movilex-${{ matrix.os }}
          path: release/**

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}